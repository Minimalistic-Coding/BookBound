<!DOCTYPE html>
<html>
<head>
    <title>BookBound - All Books</title>
    <style>
        .avatar-option input {
            display: none;  /* Hides the radio button */
        }

        .avatar-option img {
            cursor: pointer;
            border: 3px solid transparent;
            border-radius: 8px;
        }

        .avatar-option input:checked + img {
            border-color: gold;
        }
    </style>
</head>
<body>
    <label class="avatar-option">
        <input type="radio" name="avatar_id" value="1">
        <img src="app/static/avatars/1.svg" width="50" height="50">
    </label>
    <label class="avatar-option">
        <input type="radio" name="avatar_id" value="2">
        <img src="app/static/avatars/2.svg" width="50" height="50">
    </label>
</body>
</html>
