<div class="col">
    <div class="card h-100 border-0 shadow-sm custom-card-hover overflow-hidden">
        
        <!-- Fixed height container keeps the grid perfectly aligned. 
             Added p-3 for breathing room, flex utilities to center the image. -->
        <div class="bg-light position-relative w-100 p-3 d-flex align-items-center justify-content-center" style="height: 280px;">
            <a href="{{ url_for('main.book_detail', book_id=book.id) }}" class="d-block w-100 h-100 stretched-link">
                <!-- object-fit: contain guarantees NO cropping. The whole cover will show. -->
                <img src="{{ book.cover }}" loading="lazy" 
                     class="w-100 h-100" style="object-fit: contain;"
                     alt="{{ book.title }}">
            </a>
        </div>
        
        <div class="card-body d-flex flex-column px-3 py-3 border-top">
            <!-- Line-clamped title -->
            <h5 class="card-title fw-bold fs-6 mb-2 lh-sm text-dark" 
                style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.5em;">
                {{ book.title }}
            </h5>
            
            <!-- Price and Rating locked to the bottom -->
            <div class="mt-auto d-flex justify-content-between align-items-center pt-2">
                <div class="star-rating text-warning" style="font-size: 0.9rem;">
                    {{ "★" * book.rating }}<span class="text-secondary opacity-25">{{ "★" * (5 - book.rating) }}</span>
                </div>
                <span class="fw-bold text-success fs-5 lh-1">${{ book.price }}</span>
            </div>
        </div>
    </div>
</div>
